# ─────────────────────────────────────────────────────────────────────────────
# ru_rpg через OmniRoute (Claude Sonnet 4.5), полностью на русском.
#
# Это ОВЕРРАЙД поверх config.default.yaml (мерджится автоматически).
# Скопируй файл в config.yaml:   cp config.omniroute.yaml config.yaml
# и впиши свой токен в ai.apiKey.
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: 7777
  host: 0.0.0.0

# ── Подключение к OmniRoute ───────────────────────────────────────────────────
# OmniRoute даёт OpenAI-совместимый эндпоинт /v1/chat/completions на :20128,
# а приложение как раз клиент OpenAI-формата (POST {endpoint}/chat/completions,
# заголовок Authorization: Bearer <apiKey>). Поэтому подключаемся напрямую.
#
# Внутри Docker localhost — это сам контейнер, поэтому до OmniRoute на ХОСТЕ
# ходим через host.docker.internal (прокинут в docker-compose.yml).
# Если запускаешь НЕ в Docker, поставь http://localhost:20128/v1
ai:
  endpoint: "http://host.docker.internal:20128/v1"
  # Это твой ANTHROPIC_AUTH_TOKEN из OmniRoute (sk-f26...). ANTHROPIC_API_KEY оставляй пустым.
  apiKey: "sk-f26-ВПИШИ-СВОЙ-ТОКЕН"
  model: "kr/claude-sonnet-4.5"
  # Claude любит простор для длинной прозы + русский «тяжелее» по токенам:
  maxTokens: 16000
  stream: true
  # Русский текст и не-английские имена иногда ломают строгий XML-парсер — оставляем мягкий режим.

# ── Мультимодальность (понимание загруженных картинок «Отведи меня туда») ──────
# Claude Sonnet 4.5 умеет vision, поэтому используем ту же модель через OmniRoute.
ai_multimodal:
  enabled: true
  model: "kr/claude-sonnet-4.5"

# ── Генерация картинок сцен ───────────────────────────────────────────────────
# Модель kr/claude-sonnet-4.5 картинки НЕ рисует. Чтобы запуститься «только на
# OmniRoute», по умолчанию выключаем арт. Включить можно двумя путями:
#   1) engine: openai + endpoint OmniRoute /v1 + image-модель (OmniRoute умеет
#      /v1/images/generations), либо
#   2) engine: nanogpt со своим NanoGPT-ключом.
imagegen:
  enabled: false

# ── ПОЛНОСТЬЮ РУССКИЙ ВЫВОД ────────────────────────────────────────────────────
# Эта инструкция подмешивается в системный промпт ВСЕХ основных генераций
# (проза, события, генерация регионов/локаций/NPC/предметов/квестов и т.д.).
extra_system_instructions: |
  ЯЗЫК ИГРЫ — РУССКИЙ. Весь текст, который увидит игрок, пиши на грамотном,
  естественном русском языке: проза и описания, реплики и диалоги, имена
  персонажей, названия локаций, регионов, фракций, предметов, навыков, статусов,
  квестов, способностей и любые другие выводимые строки. Никогда не используй
  английский в видимом игроку тексте, если игрок прямо не попросил об обратном.
  Придумывай органичные русскоязычные имена и названия, а не транслитерации
  с английского. ВАЖНО: структуру ответа не меняй — XML-теги, имена атрибутов/полей,
  служебные ключи и перечислимые значения формата оставляй ровно такими, как в
  инструкциях (на английском); переводи только содержательный текст ВНУТРИ них.
  Числа, формулы и идентификаторы не трогай.

# Подсказки под «характер» модели в антислоп-промптах. Для Claude ближе мягкий
# режим glm (меньше микроменеджмента), оставляем как есть. Можно поменять на kimi.
repetition_buster_mode: glm
